<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FX COCKPIT FX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){var t=localStorage.getItem('fx-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── THEMES ─── */
:root,[data-theme="dark"]{
  --bg:#0a0a0f;--bg2:#0f0f18;--bg3:#1a1a2e;
  --border:#1e1e2e;--border2:#5a5a7a;
  --text:#e8e8f8;--muted:#9a9aba;
  --cyan:#38c9c9;--cyan-dim:#0e4040;
  --green:#2ecc71;--red:#e74c3c;
  --gold:#f0b429;--btc:#f7931a;
  --scanline:1;
}
[data-theme="light"]{
  --bg:#f0f0f8;--bg2:#e4e4f0;--bg3:#ffffff;
  --border:#d0d0e0;--border2:#b8b8cc;
  --text:#1a1a30;--muted:#7878a0;
  --cyan:#006888;--cyan-dim:#c0e8f4;
  --green:#1a7a3a;--red:#c01818;
  --gold:#a86e00;--btc:#a05000;
  --scanline:0;
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:16px;
  min-height:100dvh;display:flex;flex-direction:column;
  overflow-x:hidden;transition:background .2s,color .2s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  opacity:var(--scanline);transition:opacity .2s;
}
a{color:inherit;text-decoration:none;}
button{font-family:'Noto Sans JP',sans-serif;}

/* ─── HEADER ─── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;height:52px;
  border-bottom:1px solid var(--border);background:var(--bg2);
  flex-shrink:0;gap:8px;min-width:0;
}
.logo{font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--cyan);white-space:nowrap;}
.logo span{color:var(--muted);font-size:11px;font-weight:400;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
#clock{font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;letter-spacing:.03em;}
.theme-switcher{display:flex;gap:3px;}
.theme-btn{
  padding:5px 8px;border-radius:4px;border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;line-height:1;
}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
.theme-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,201,201,.1);}

/* ─── SESSION BAR ─── */
#session-bar{
  display:flex;gap:6px;padding:8px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.session-pill{
  font-size:12px;font-weight:500;padding:4px 10px;border-radius:3px;
  border:1.5px solid var(--border2);color:var(--muted);letter-spacing:.04em;
  transition:all .3s;white-space:nowrap;
}
.session-pill.active{color:var(--green);border-color:var(--green);background:rgba(46,204,113,.08);box-shadow:0 0 8px rgba(46,204,113,.2);}
.session-pill .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:5px;vertical-align:middle;}
.session-pill.active .dot{animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── PAGE CONTENT ─── */
.page-content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 12px 48px;display:flex;flex-direction:column;gap:14px;
}

/* ─── SECTION HEADING ─── */
.sec-heading{
  font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);
  text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);
}

/* ─── TRADINGVIEW WIDGET ─── */
.tv-main-grid{display:flex;flex-direction:column;gap:8px;}
.tv-widget-wrap{border-radius:8px;overflow:hidden;border:1.5px solid var(--border2);width:100%;}
.tradingview-widget-copyright{padding:2px 8px 4px;background:transparent;font-size:11px;line-height:1.4;text-align:right;}
.tradingview-widget-copyright .blue-text{color:var(--muted)!important;text-decoration:underline;}

/* ─── CHART GRID ─── */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chart-slot{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:12px;min-height:80px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;text-align:center;user-select:none;
}
.chart-slot.empty{border-style:dashed;}
.chart-slot.empty:active,.chart-slot.filled:active{opacity:.7;}
.slot-symbol{font-size:13px;font-weight:700;color:var(--text);}
.slot-name{font-size:10px;color:var(--muted);margin-top:2px;}
.slot-price{font-size:13px;font-weight:700;color:var(--cyan);margin-top:6px;}
.slot-price.stale{color:var(--muted);}
.closed-tag{font-size:10px;font-weight:400;color:var(--muted);}
.slot-add-icon{font-size:22px;color:var(--muted);}
.slot-add-label{font-size:10px;color:#8a8aaa;font-weight:700;margin-top:4px;}

/* ─── LAUNCH GRID ─── */
.launch-grid{display:flex;flex-direction:column;gap:8px;}
.launch-tv{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:15px;font-weight:700;color:var(--text);
  transition:border-color .15s,opacity .15s;
}
.launch-tv:active{opacity:.7;}
.tv-icon{font-size:20px;}
.launch-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.launch-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 8px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:14px;font-weight:700;color:var(--text);
  text-align:center;transition:border-color .15s,opacity .15s;
}
.launch-btn:active{opacity:.7;}
.launch-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:3px;}

/* ─── FEAR & GREED ─── */
.fng-wrap{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;
}
.fng-value{font-size:40px;font-weight:700;line-height:1;min-width:56px;text-align:center;}
.fng-info{display:flex;flex-direction:column;gap:2px;}
.fng-label{font-size:15px;font-weight:700;}
.fng-updated{font-size:11px;color:var(--muted);margin-top:4px;}
.fng-meter{
  flex:1;height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin-top:6px;
}
.fng-meter-bar{height:100%;border-radius:4px;transition:width .5s;}

/* ─── NEWS ─── */
.news-list{display:flex;flex-direction:column;gap:6px;}
.news-item{
  padding:10px 12px;background:var(--bg3);
  border:1.5px solid var(--border2);border-radius:6px;
}
.news-meta{font-size:11px;color:var(--muted);margin-bottom:4px;}
.news-title a{
  font-size:13px;color:var(--text);line-height:1.5;
  text-decoration:none;display:block;
}
.news-title a:hover{color:var(--cyan);}
.news-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── MODAL OVERLAY ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:flex-end;
}
.modal-overlay.hidden{display:none;}

/* ─── MODAL SHEET ─── */
.modal-sheet{
  width:100%;max-height:85vh;background:var(--bg2);
  border-radius:12px 12px 0 0;border-top:1.5px solid var(--border2);
  padding:16px 14px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;}
.modal-close:hover{color:var(--text);}

.modal-search-wrap{margin-bottom:12px;}
.modal-search-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;padding:10px 12px;color:var(--text);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.modal-search-input:focus{border-color:var(--cyan);}
.modal-search-input::placeholder{color:var(--muted);}
.modal-search-input::-webkit-search-cancel-button{display:none;}

.result-item{
  padding:10px 12px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;margin-bottom:4px;cursor:pointer;
  display:flex;gap:10px;align-items:center;transition:border-color .15s;
}
.result-item:hover{border-color:var(--cyan-dim);}
.result-item:active{opacity:.7;}
.result-symbol{font-size:13px;font-weight:700;color:var(--text);min-width:52px;}
.result-name{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-badge{
  font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;
  flex-shrink:0;letter-spacing:.04em;
}
.result-badge-xyz{background:rgba(56,201,201,.15);color:var(--cyan);border:1px solid rgba(56,201,201,.3);}
.result-badge-pyth{background:rgba(130,80,255,.15);color:#a080ff;border:1px solid rgba(130,80,255,.3);}
.results-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── LONGPRESS MENU ─── */
#overlay-lp .modal-sheet{padding:16px 14px 32px;}
.longpress-menu{display:flex;flex-direction:column;gap:8px;}
.longpress-menu button{
  padding:14px;border-radius:8px;border:1.5px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.longpress-menu button:active{opacity:.7;}
#lp-delete{color:var(--red);border-color:var(--red);}
#lp-cancel{color:var(--muted);}

/* ─── RESPONSIVE ─── */
@media(max-width:375px){
  #clock{font-size:11px;}
  .slot-price{font-size:12px;}
  .slot-symbol{font-size:12px;}
}
</style>

<script>
// ─── CONSTANTS ───────────────────────────────────────
const STORAGE_KEY        = 'fxc-fx-data-v3';
const UNIVERSE_CACHE_KEY = 'pyth_xyz_universe_cache';
const UNIVERSE_CACHE_TTL = 24 * 60 * 60 * 1000;
const MAX_CHARTS         = 8;
const PRICE_INTERVAL     = 5000;
const MARKET_STALE_MS    = 6 * 60 * 60 * 1000;

const DEFAULT_CHARTS = [
  {id:'710afe0041a07156bfd71971160c78a326bf8121403e0d4e140d06bea0353b7f', symbol:'USDXY', name:'US Dollar Index', source:'pyth'},
  {id:'xyz:CL',     symbol:'CL',    name:'WTI Oil',     source:'xyz'},
  {id:'xyz:EUR',    symbol:'EUR',   name:'EUR/USD',     source:'xyz'},
  {id:'xyz:JP225',  symbol:'JP225', name:'Nikkei 225',  source:'xyz'},
  null, null, null, null,
];

// ─── STATE ───────────────────────────────────────────
let _data             = { charts: DEFAULT_CHARTS.map(c => c ? {...c} : null) };
let _universe         = [];
let _prices           = {};
let _pythPrices       = {};
let _pythPublishTimes = {};
let _pendingSlot      = null;
let _searchTimer      = null;

// ─── STORAGE ─────────────────────────────────────────
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const p = JSON.parse(s);
      if (Array.isArray(p.charts)) {
        _data.charts = p.charts;
        while (_data.charts.length < MAX_CHARTS) _data.charts.push(null);
        _data.charts = _data.charts.slice(0, MAX_CHARTS);
      }
    } else {
      saveData();
    }
  } catch(e) { saveData(); }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(_data));
}

// ─── UNIVERSE CACHE ───────────────────────────────────
function getCachedUniverse() {
  try {
    const raw = localStorage.getItem(UNIVERSE_CACHE_KEY);
    if (!raw) return null;
    const cache = JSON.parse(raw);
    if (!cache.timestamp || Date.now() - cache.timestamp > UNIVERSE_CACHE_TTL) return null;
    return Array.isArray(cache.feeds) ? cache.feeds : null;
  } catch(e) { return null; }
}

function setCachedUniverse(feeds) {
  try {
    localStorage.setItem(UNIVERSE_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), feeds }));
  } catch(e) {}
}

// ─── UNIVERSE FETCH ───────────────────────────────────
async function fetchXyzUniverse() {
  const res = await fetch('https://api.hyperliquid.xyz/info', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: 'metaAndAssetCtxs', dex: 'xyz'}),
  });
  if (!res.ok) throw new Error('xyz universe HTTP ' + res.status);
  const d = await res.json();
  const universe = Array.isArray(d) && d[0] && Array.isArray(d[0].universe) ? d[0].universe : [];
  return universe.map(u => ({
    id:     'xyz:' + u.name,
    symbol: u.name,
    name:   u.name,
    source: 'xyz',
  }));
}

async function fetchPythUniverse() {
  const res = await fetch('https://hermes.pyth.network/v2/price_feeds');
  if (!res.ok) throw new Error('pyth universe HTTP ' + res.status);
  const feeds = await res.json();
  return feeds
    .map(f => ({
      id:     f.id,
      symbol: (f.attributes && (f.attributes.generic_symbol || f.attributes.symbol)) || '',
      name:   (f.attributes && f.attributes.description) || '',
      source: 'pyth',
    }))
    .filter(f => f.symbol);
}

async function loadUniverse() {
  const cached = getCachedUniverse();
  if (cached) {
    _universe = cached;
    console.log('Universe from cache:', _universe.length);
    return;
  }

  const [xyzResult, pythResult] = await Promise.allSettled([
    fetchXyzUniverse(),
    fetchPythUniverse(),
  ]);

  const xyz  = xyzResult.status  === 'fulfilled' ? xyzResult.value  : [];
  const pyth = pythResult.status === 'fulfilled' ? pythResult.value : [];

  if (xyzResult.status !== 'fulfilled')  console.warn('xyz universe failed:', xyzResult.reason);
  if (pythResult.status !== 'fulfilled') console.warn('pyth universe failed:', pythResult.reason);

  const xyzSymbols = new Set(xyz.map(f => f.symbol.toUpperCase()));
  const pythFiltered = pyth.filter(f => !xyzSymbols.has(f.symbol.toUpperCase()));

  _universe = [...xyz, ...pythFiltered];
  setCachedUniverse(_universe);
  console.log('Universe built: xyz=%d pyth=%d total=%d', xyz.length, pythFiltered.length, _universe.length);
}

// ─── SEARCH ──────────────────────────────────────────
function searchSymbols(raw) {
  const q = raw.trim().toLowerCase();
  if (!q) return [];
  return _universe
    .filter(s => {
      const sym  = s.symbol.toLowerCase();
      const name = s.name.toLowerCase();
      return sym.includes(q) || name.includes(q);
    })
    .slice(0, 30);
}

function coinSource(coin) {
  if (coin.source) return coin.source;
  return coin.id.startsWith('xyz:') ? 'xyz' : 'pyth';
}

// ─── FORMAT ──────────────────────────────────────────
function fmtPrice(v) {
  if (v == null) return '--';
  const n = parseFloat(v);
  if (isNaN(n)) return '--';
  if (n >= 10000) return n.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (n >= 100)   return n.toLocaleString('en-US', {maximumFractionDigits: 3});
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toJST(isoDate) {
  if (!isoDate) return '';
  try {
    const d   = new Date(isoDate);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    const mm  = String(jst.getUTCMonth() + 1).padStart(2, '0');
    const dd  = String(jst.getUTCDate()).padStart(2, '0');
    const hh  = String(jst.getUTCHours()).padStart(2, '0');
    const mn  = String(jst.getUTCMinutes()).padStart(2, '0');
    return `${mm}/${dd} ${hh}:${mn}`;
  } catch(e) { return ''; }
}

// ─── PRICE INFO ───────────────────────────────────────
function getPriceInfo(coin) {
  const src = coinSource(coin);
  if (src === 'xyz') {
    return { priceText: fmtPrice(_prices[coin.id]), stale: false };
  }
  const px  = _pythPrices[coin.id];
  const pt  = _pythPublishTimes[coin.id];
  const stale = pt != null && (Date.now() / 1000 - pt) > MARKET_STALE_MS / 1000;
  return { priceText: fmtPrice(px), stale };
}

// ─── RENDER CHART SLOTS ──────────────────────────────
function renderChartSlots() {
  const grid = document.getElementById('chart-grid');
  grid.innerHTML = '';
  _data.charts.forEach((coin, i) => {
    const el = document.createElement('div');
    if (coin) {
      const { priceText, stale } = getPriceInfo(coin);
      el.className = 'chart-slot filled';
      el.innerHTML =
        `<div class="slot-symbol">${escHtml(coin.symbol)}</div>` +
        `<div class="slot-name">${escHtml(coin.name)}</div>` +
        `<div class="slot-price${stale ? ' stale' : ''}">` +
          escHtml(priceText) +
          (stale ? ' <span class="closed-tag">(休場)</span>' : '') +
        `</div>`;
      el.dataset.coinId  = coin.id;
      el.dataset.coinSrc = coinSource(coin);
    } else {
      el.className = 'chart-slot empty';
      el.innerHTML = '<div class="slot-add-icon">＋</div><div class="slot-add-label">銘柄を追加</div>';
    }
    el.dataset.slot = i;
    attachSlotHandlers(el, i);
    grid.appendChild(el);
  });
}

function refreshPriceDisplay() {
  document.querySelectorAll('.chart-slot.filled').forEach(el => {
    const coinId = el.dataset.coinId;
    const coin   = _data.charts.find(c => c && c.id === coinId);
    if (!coin) return;
    const priceEl = el.querySelector('.slot-price');
    if (!priceEl) return;
    const { priceText, stale } = getPriceInfo(coin);
    priceEl.className = 'slot-price' + (stale ? ' stale' : '');
    priceEl.innerHTML = escHtml(priceText) + (stale ? ' <span class="closed-tag">(休場)</span>' : '');
  });
}

// ─── SLOT HANDLERS (TAP + LONG PRESS) ────────────────
function attachSlotHandlers(el, index) {
  let lpTimer = null;
  let lpFired = false;
  let startX  = 0;
  let startY  = 0;

  el.addEventListener('touchstart', e => {
    lpFired = false;
    startX  = e.touches[0].clientX;
    startY  = e.touches[0].clientY;
    lpTimer = setTimeout(() => {
      lpFired = true;
      showLpMenu(index);
    }, 600);
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!lpTimer) return;
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dx > 10 || dy > 10) { clearTimeout(lpTimer); lpTimer = null; }
  }, { passive: true });

  el.addEventListener('touchend',   () => { clearTimeout(lpTimer); lpTimer = null; });
  el.addEventListener('touchcancel',() => { clearTimeout(lpTimer); lpTimer = null; });
  el.addEventListener('contextmenu', e => e.preventDefault());

  el.addEventListener('click', () => {
    if (lpFired) { lpFired = false; return; }
    const coin = _data.charts[index];
    if (coin) {
      window.open('https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(coin.symbol), '_blank', 'noopener');
    } else {
      openChartModal(index);
    }
  });
}

// ─── LONG PRESS MENU ─────────────────────────────────

  document.getElementById('overlay-lp').classList.remove('hidden');
}

function hideLpMenu() {

}

document.getElementById('lp-delete').addEventListener('click', () => {

  _data.charts[_pendingSlot] = null;

});

document.getElementById('lp-cancel').addEventListener('click', hideLpMenu);
document.getElementById('overlay-lp').addEventListener('click', e => {

// ─── CHART MODAL ─────────────────────────────────────
function openChartModal(index) {
  _pendingSlot = index;
  document.getElementById('chart-search').value = '';
  document.getElementById('chart-results').innerHTML = '';
  document.getElementById('overlay-chart').classList.remove('hidden');
  setTimeout(() => document.getElementById('chart-search').focus(), 280);
}

function closeChartModal() {
  document.getElementById('overlay-chart').classList.add('hidden');
}

document.getElementById('close-chart').addEventListener('click', closeChartModal);
document.getElementById('overlay-chart').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay-chart')) closeChartModal();
});

document.getElementById('chart-search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  const q = e.target.value;
  _searchTimer = setTimeout(() => {
    const container = document.getElementById('chart-results');
    if (!q.trim()) { container.innerHTML = ''; return; }
    const results = searchSymbols(q);
    if (!results.length) {
      container.innerHTML = '<div class="results-empty">該当銘柄なし</div>';
      return;
    }
    container.innerHTML = results.map(s => {
      const badgeClass = s.source === 'xyz' ? 'result-badge-xyz' : 'result-badge-pyth';
      const badgeLabel = s.source === 'xyz' ? 'HYP' : 'PYTH';
      return (
        `<div class="result-item" data-id="${escHtml(s.id)}" data-symbol="${escHtml(s.symbol)}" data-name="${escHtml(s.name)}" data-source="${escHtml(s.source)}">` +
          `<span class="result-symbol">${escHtml(s.symbol)}</span>` +
          `<span class="result-name">${escHtml(s.name)}</span>` +
          `<span class="result-badge ${badgeClass}">${badgeLabel}</span>` +
        `</div>`
      );
    }).join('');
  }, 200);
});

document.getElementById('chart-results').addEventListener('click', e => {
  const item = e.target.closest('.result-item');
  if (!item || _pendingSlot == null) return;
  const idx = _pendingSlot;
  _data.charts[idx] = {
    id:     item.dataset.id,
    symbol: item.dataset.symbol,
    name:   item.dataset.name,
    source: item.dataset.source,
  };
  saveData();
  closeChartModal();
  renderChartSlots();
  fetchPricesNow();
});

// ─── PRICE FETCH: xyz ─────────────────────────────────
async function fetchXyzPrices() {
  try {
    const res = await fetch('https://api.hyperliquid.xyz/info', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type: 'allMids', dex: 'xyz'}),
    });
    if (!res.ok) { console.warn('xyz price HTTP error:', res.status); return; }
    const d       = await res.json();
    const rawMids = (d && d.mids && typeof d.mids === 'object') ? d.mids : (d || {});
    for (const [key, val] of Object.entries(rawMids)) {
      if (typeof val !== 'string' && typeof val !== 'number') continue;
      _prices[key] = val;
      if (!key.startsWith('xyz:')) _prices['xyz:' + key] = val;
    }
  } catch(e) { console.warn('xyz price fetch failed:', e); }
}

// ─── PRICE FETCH: Pyth (batched) ──────────────────────
async function fetchPythPrices(pythCharts) {
  if (!pythCharts.length) return;
  try {
    const params = pythCharts.map(c => 'ids[]=' + encodeURIComponent(c.id)).join('&');
    const res    = await fetch('https://hermes.pyth.network/v2/updates/price/latest?' + params);
    if (!res.ok) { console.warn('Pyth price HTTP error:', res.status); return; }
    const d      = await res.json();
    const parsed = Array.isArray(d.parsed) ? d.parsed : [];
    for (const entry of parsed) {
      const id    = entry.id;
      const price = entry.price.price * Math.pow(10, entry.price.expo);
      _pythPrices[id]       = price;
      _pythPublishTimes[id] = entry.price.publish_time;
    }
  } catch(e) { console.warn('Pyth price fetch failed (prev values retained):', e); }
}

// ─── PRICE UPDATE (5s poll) ───────────────────────────
async function updatePrices() {
  const activeCharts = _data.charts.filter(Boolean);
  const pythCharts   = activeCharts.filter(c => coinSource(c) === 'pyth');

  await Promise.allSettled([
    fetchXyzPrices(),
    fetchPythPrices(pythCharts),
  ]);
  refreshPriceDisplay();
}

function fetchPricesNow() { updatePrices(); }

// ─── FEAR & GREED ─────────────────────────────────────
async function loadFng() {
  try {
    const res = await fetch('https://api.alternative.me/fng/');
    if (!res.ok) return;
    const d    = await res.json();
    const item = d.data && d.data[0];
    if (!item) return;
    const val   = parseInt(item.value, 10);
    const label = item.value_classification || '';
    const ts    = new Date(parseInt(item.timestamp, 10) * 1000);
    const mm    = String(ts.getMonth() + 1).padStart(2, '0');
    const dd    = String(ts.getDate()).padStart(2, '0');
    const color = val <= 25 ? 'var(--red)'
                : val <= 46 ? '#e67e22'
                : val <= 54 ? 'var(--muted)'
                : val <= 75 ? 'var(--green)'
                :             '#27ae60';
    const vEl = document.getElementById('fng-value');
    const lEl = document.getElementById('fng-label');
    const uEl = document.getElementById('fng-updated');
    const bEl = document.getElementById('fng-bar');
    if (vEl) { vEl.textContent = val; vEl.style.color = color; }
    if (lEl) { lEl.textContent = label; lEl.style.color = color; }
    if (uEl)   uEl.textContent = `更新: ${mm}/${dd}`;
    if (bEl) { bEl.style.width = val + '%'; bEl.style.background = color; }
  } catch(e) { console.warn('FnG load failed:', e); }
}

// ─── NEWS ─────────────────────────────────────────────
async function loadNews() {
  const container = document.getElementById('news-list');
  try {
    const res = await fetch('public/data/news.json');
    if (!res.ok) throw new Error('fetch failed');
    const d      = await res.json();
    const gold   = Array.isArray(d.gold_items)   ? d.gold_items   : [];
    const usdjpy = Array.isArray(d.usdjpy_items) ? d.usdjpy_items : [];
    const all    = [...gold, ...usdjpy]
      .sort((a, b) => (b.isoDate || '').localeCompare(a.isoDate || ''))
      .slice(0, 15);
    if (!all.length) {
      container.innerHTML = '<div class="news-empty">ニュースなし</div>';
      return;
    }
    container.innerHTML = all.map(item =>
      `<div class="news-item">` +
        `<div class="news-meta">${escHtml(item.source || '')} · ${escHtml(toJST(item.isoDate))} JST</div>` +
        `<div class="news-title"><a href="${escHtml(item.link || '#')}" target="_blank" rel="noopener">${escHtml(item.title || '')}</a></div>` +
      `</div>`
    ).join('');
  } catch(e) {
    container.innerHTML = '<div class="news-empty">ニュース取得エラー</div>';
    console.warn('News load failed:', e);
  }
}

// ─── SESSIONS ────────────────────────────────────────
function updateSessions() {
  const now = new Date();
  const h   = now.getHours() + now.getMinutes() / 60;
  function active(s, e) { return e <= 24 ? h >= s && h < e : h >= s || h < (e - 24); }
  document.getElementById('sess-tokyo').classList.toggle('active',  active(8,  15));
  document.getElementById('sess-london').classList.toggle('active', active(16, 25));
  document.getElementById('sess-ny').classList.toggle('active',     active(21, 30));
}
setInterval(updateSessions, 10000);

// ─── PULL TO REFRESH ─────────────────────────────────
(function() {
  const content   = document.querySelector('.page-content');
  const indicator = document.getElementById('ptr-indicator');
  let startY  = 0;
  let pulling = false;
  const THRESHOLD = 80;

  content.addEventListener('touchstart', e => {
    if (content.scrollTop === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  content.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && content.scrollTop === 0) {
      const progress = Math.min(dy, THRESHOLD * 1.5);
      indicator.style.height = Math.min(progress * 0.5, 44) + 'px';
      indicator.textContent  = dy >= THRESHOLD ? '離して更新' : '↓ 引っ張って更新';
    }
  }, { passive: true });

  content.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    indicator.style.height = '0';
    indicator.textContent  = '↓ 引っ張って更新';
    if (dy >= THRESHOLD && content.scrollTop === 0) {
      updatePrices();
      loadFng();
    }
  }, { passive: true });
})();

// ─── SERVICE WORKER ───────────────────────────────────
if ('serviceWorker' in navigator) {
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
  });
}
