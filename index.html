<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FX COCKPIT FX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){var t=localStorage.getItem('fx-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
/* ─── THEMES ─── */
:root,[data-theme="dark"]{
  --bg:#061a18;--bg2:#041210;--bg3:#041210;
  --border:#0e2e2a;--border2:#1a4840;
  --text:#d0f0e8;--muted:#1a4840;
  --cyan:#00e09a;--cyan-dim:#0a3028;
  --green:#00e09a;--red:#e06060;
  --header-bg:#041210;--header-accent:#00e09a;
  --scanline:1;
}
[data-theme="light"]{
  --bg:#f0faf6;--bg2:#e8f6f0;--bg3:#ffffff;
  --border:#c8e8d8;--border2:#a0d0b8;
  --text:#041a10;--muted:#1a6040;
  --cyan:#008855;--cyan-dim:#c0e8d0;
  --green:#008855;--red:#cc3300;
  --header-bg:#063a28;--header-accent:#00c880;
  --scanline:0;
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:16px;
  min-height:100dvh;display:flex;flex-direction:column;
  overflow-x:hidden;transition:background .2s,color .2s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  opacity:var(--scanline);transition:opacity .2s;
}
a{color:inherit;text-decoration:none;}
button{font-family:'Noto Sans JP',sans-serif;}

/* ─── HEADER ─── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;height:52px;
  border-bottom:2px solid var(--header-accent);background:var(--header-bg);
  flex-shrink:0;gap:8px;min-width:0;
}
.logo{font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--header-accent);white-space:nowrap;}
.logo span{color:var(--muted);font-size:11px;font-weight:400;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
#clock{font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;letter-spacing:.03em;}
.theme-switcher{display:flex;gap:3px;}
.theme-btn{
  padding:5px 8px;border-radius:4px;border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;line-height:1;
}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
.theme-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,201,201,.1);}

/* ─── SESSION BAR ─── */
#session-bar{
  display:flex;gap:6px;padding:8px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.session-pill{
  font-size:12px;font-weight:500;padding:4px 10px;border-radius:3px;
  border:1.5px solid var(--border2);color:var(--muted);letter-spacing:.04em;
  transition:all .3s;white-space:nowrap;
}
.session-pill.active{color:var(--green);border-color:var(--green);background:rgba(46,204,113,.08);box-shadow:0 0 8px rgba(46,204,113,.2);}
.session-pill .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:5px;vertical-align:middle;}
.session-pill.active .dot{animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── PAGE CONTENT ─── */
.page-content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 12px 48px;display:flex;flex-direction:column;gap:14px;
}

/* ─── SECTION HEADING ─── */
.sec-heading{
  font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);
  text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);
}

/* ─── TRADINGVIEW WIDGET WRAP ─── */
.tv-main-grid{display:flex;flex-direction:column;gap:8px;}
.tv-widget-card{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  overflow:hidden;width:100%;display:flex;flex-direction:column;
}
/* ウィジェット上部の価格ヘッダー (以前の見た目を再現) */
.widget-header{padding:12px 16px 8px;display:flex;flex-direction:column;gap:4px;}
.widget-title-row{display:flex;align-items:center;gap:8px;}
.widget-icon{width:24px;height:24px;border-radius:50%;}
.widget-symbol-name{font-size:15px;font-weight:700;color:var(--text);}
.widget-price-row{display:flex;align-items:baseline;gap:8px;margin-top:2px;}
.widget-price-main{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.widget-price-currency{font-size:11px;color:var(--muted);font-weight:500;}
.widget-change{font-size:13px;font-weight:700;}
.widget-change.up{color:var(--green);}
.widget-change.down{color:var(--red);}

.tv-chart-container{height:160px;width:100%;} /* チャートの高さを少し抑えてバランス調整 */

/* ─── CHART GRID ─── */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chart-slot{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:12px;min-height:80px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;text-align:center;user-select:none;
}
.chart-slot.empty{border-style:dashed;}
.chart-slot.empty:active,.chart-slot.filled:active{opacity:.7;}
.slot-symbol{font-size:13px;font-weight:700;color:var(--text);}
.slot-name{font-size:10px;color:var(--muted);margin-top:2px;}
.slot-price{font-size:13px;font-weight:700;color:var(--cyan);margin-top:6px;}
.slot-price.stale{color:var(--muted);}
.closed-tag{font-size:10px;font-weight:400;color:var(--muted);}
.slot-add-icon{font-size:22px;color:var(--muted);}
.slot-add-label{font-size:10px;color:#8a8aaa;font-weight:700;margin-top:4px;}

/* ─── LAUNCH GRID ─── */
.launch-grid{display:flex;flex-direction:column;gap:8px;}
.launch-tv{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:15px;font-weight:700;color:var(--text);
  transition:border-color .15s,opacity .15s;
}
.launch-tv:active{opacity:.7;}
.tv-icon{font-size:20px;}
.launch-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.launch-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 8px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:14px;font-weight:700;color:var(--text);
  text-align:center;transition:border-color .15s,opacity .15s;
}
.launch-btn:active{opacity:.7;}
.launch-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:3px;}

/* ─── FEAR & GREED ─── */
.fng-wrap{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;
}
.fng-value{font-size:40px;font-weight:700;line-height:1;min-width:56px;text-align:center;}
.fng-info{display:flex;flex-direction:column;gap:2px;}
.fng-label{font-size:15px;font-weight:700;}
.fng-updated{font-size:11px;color:var(--muted);margin-top:4px;}
.fng-meter{
  flex:1;height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin-top:6px;
}
.fng-meter-bar{height:100%;border-radius:4px;transition:width .5s;}

/* ─── NEWS ─── */
.news-list{display:flex;flex-direction:column;gap:6px;}
.news-item{
  padding:10px 12px;background:var(--bg3);
  border:1.5px solid var(--border2);border-radius:6px;
}
.news-meta{font-size:11px;color:var(--muted);margin-bottom:4px;}
.news-title a{
  font-size:13px;color:var(--text);line-height:1.5;
  text-decoration:none;display:block;
}
.news-title a:hover{color:var(--cyan);}
.news-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── MODAL OVERLAY ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:flex-end;
}
.modal-overlay.hidden{display:none;}

/* ─── MODAL SHEET ─── */
.modal-sheet{
  width:100%;max-height:85vh;background:var(--bg2);
  border-radius:12px 12px 0 0;border-top:1.5px solid var(--border2);
  padding:16px 14px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;}
.modal-close:hover{color:var(--text);}

.modal-search-wrap{margin-bottom:12px;}
.modal-search-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;padding:10px 12px;color:var(--text);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.modal-search-input:focus{border-color:var(--cyan);}
.modal-search-input::placeholder{color:var(--muted);}
.modal-search-input::-webkit-search-cancel-button{display:none;}

.result-item{
  padding:10px 12px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;margin-bottom:4px;cursor:pointer;
  display:flex;gap:10px;align-items:center;transition:border-color .15s;
}
.result-item:hover{border-color:var(--cyan-dim);}
.result-item:active{opacity:.7;}
.result-symbol{font-size:13px;font-weight:700;color:var(--text);min-width:52px;}
.result-name{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-badge{
  font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;
  flex-shrink:0;letter-spacing:.04em;
}
.result-badge-xyz{background:rgba(56,201,201,.15);color:var(--cyan);border:1px solid rgba(56,201,201,.3);}
.result-badge-pyth{background:rgba(130,80,255,.15);color:#a080ff;border:1px solid rgba(130,80,255,.3);}
.results-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── LONGPRESS MENU ─── */
#overlay-lp .modal-sheet{padding:16px 14px 32px;}
.longpress-menu{display:flex;flex-direction:column;gap:8px;}
.longpress-menu button{
  padding:14px;border-radius:8px;border:1.5px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.longpress-menu button:active{opacity:.7;}
#lp-delete{color:var(--red);border-color:var(--red);}
#lp-cancel{color:var(--muted);}

/* ─── RESPONSIVE ─── */
@media(max-width:375px){
  #clock{font-size:11px;}
  .slot-price{font-size:12px;}
  .slot-symbol{font-size:12px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">FX COCKPIT FX <span>by azteca</span></div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="dark">D</button>
      <button class="theme-btn" data-theme="light">L</button>
    </div>
  </div>
</header>

<div id="session-bar">
  <div class="session-pill" id="sess-tokyo"><span class="dot"></span>東京</div>
  <div class="session-pill" id="sess-london"><span class="dot"></span>ロンドン</div>
  <div class="session-pill" id="sess-ny"><span class="dot"></span>ニューヨーク</div>
</div>

<div id="ptr-indicator" style="
  text-align:center;
  font-size:12px;
  color:var(--muted);
  height:0;
  overflow:hidden;
  transition:height .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg2);
">↓ 引っ張って更新</div>

<div class="page-content">

  <div class="tv-main-grid">
    <!-- 米ドル/円 カード -->
    <div class="tv-widget-card">
      <div class="widget-header">
        <div class="widget-title-row">
          <img class="widget-icon" src="https://s3-symbol-logo.tradingview.com/country/US.svg" alt="US">
          <span class="widget-symbol-name">米ドル／円</span>
        </div>
        <div class="widget-price-row">
          <span class="widget-price-main" id="main-price-usdjpy">---.---</span>
          <span class="widget-price-currency">JPY</span>
          <!-- 騰落率はウィジェット側の軸を見るため一旦簡易表示 -->
        </div>
      </div>
      <div class="tv-chart-container" id="tv-usdjpy-wrap"></div>
    </div>

    <!-- ゴールド カード -->
    <div class="tv-widget-card">
      <div class="widget-header">
        <div class="widget-title-row">
          <img class="widget-icon" src="https://s3-symbol-logo.tradingview.com/indices/gold.svg" alt="Gold">
          <span class="widget-symbol-name">金／米ドル</span>
        </div>
        <div class="widget-price-row">
          <span class="widget-price-main" id="main-price-gold">-,---.---</span>
          <span class="widget-price-currency">USD</span>
        </div>
      </div>
      <div class="tv-chart-container" id="tv-dxy-wrap"></div>
    </div>
  </div>

  <div class="sec-heading">マイチャート</div>
  <div class="chart-grid" id="chart-grid"></div>

  <div class="sec-heading">アプリ起動</div>
  <div class="launch-grid">
    <button class="launch-tv" id="btn-tradingview">
      <span class="tv-icon">📈</span>
      TradingView
    </button>
    <div class="launch-row">
      <a class="launch-btn" href="metatrader5://">
        MT5
        <span class="launch-sub">MetaTrader 5</span>
      </a>
      <a class="launch-btn" href="metatrader4://">
        MT4
        <span class="launch-sub">MetaTrader 4</span>
      </a>
    </div>
  </div>

  <div class="sec-heading">恐怖強欲指数</div>
  <div class="fng-wrap">
    <div class="fng-value" id="fng-value">--</div>
    <div class="fng-info">
      <div class="fng-label" id="fng-label">--</div>
      <div class="fng-meter"><div class="fng-meter-bar" id="fng-bar" style="width:0%"></div></div>
      <div class="fng-updated" id="fng-updated"></div>
    </div>
  </div>

  <div class="sec-heading">ニュース</div>
  <div class="news-list" id="news-list">
    <div class="news-empty">読み込み中...</div>
  </div>

</div>

<script>
// --- [中略: loadData, saveData, Universe関連,fmtPriceなどはそのまま維持] ---
// ... (既存のスクリプトをそのまま使用) ...

// --- ウィジェット初期化部分の改良 ---
function initTVWidgets() {
  const theme = document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';

  function createWidget(containerId, symbol) {
    if (typeof TradingView !== 'undefined') {
      new TradingView.widget({
        "autosize": true,
        "symbol": symbol,
        "interval": "60",
        "timezone": "Etc/UTC",
        "theme": theme,
        "style": "1",
        "locale": "ja",
        "toolbar_bg": "rgba(0,0,0,0)",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "hide_legend": true,
        "save_image": false,
        "container_id": containerId,
        "range": "5D",
        "details": false,
        "hotlist": false,
        "calendar": false,
        "show_popup_button": false,
        // 価格情報の同期用 (ウィジェット側で取得した価格をヘッダーに反映させるのは困難なため、既存の価格取得エンジンを利用)
      });
    }
  }

  createWidget('tv-usdjpy-wrap', 'OANDA:USDJPY');
  createWidget('tv-dxy-wrap', 'OANDA:XAUUSD');
}

// 価格更新エンジンに、USDJPYとGOLDのメイン表示への反映を追加
async function updatePrices() {
  const activeCharts = _data.charts.filter(Boolean);
  const pythCharts   = activeCharts.filter(c => (c.source || (c.id.startsWith('xyz:') ? 'xyz' : 'pyth')) === 'pyth');

  // メインの2銘柄も価格取得対象に含める (もしuniverseにない場合でも取得できるよう個別に叩く想定)
  await Promise.allSettled([
    fetchXyzPrices(),
    fetchPythPrices(pythCharts),
  ]);

  refreshPriceDisplay();

  // メインカードの価格表示を更新 (マイチャートのデータを流用するか、別途取得)
  // ここではSさんの既存の _prices などのステートから値を拾うロジックを追加
  const usdjpyPrice = _prices['xyz:USDJPY'] || _prices['USDJPY'] || "---.---";
  const goldPrice = _prices['xyz:GOLD'] || _prices['XAUUSD'] || "---.---";
  
  if(document.getElementById('main-price-usdjpy')) document.getElementById('main-price-usdjpy').textContent = usdjpyPrice;
  if(document.getElementById('main-price-gold')) document.getElementById('main-price-gold').textContent = goldPrice;
}

// ... (残りの init関数やイベントリスナーなどはそのまま維持) ...
</script>
</body>
</html>
