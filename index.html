<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FX COCKPIT FX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){var t=localStorage.getItem('fx-theme')||'light';document.documentElement.dataset.theme=t;})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<!-- 高機能チャート用エンジン -->
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
/* ─── THEMES ─── */
:root,[data-theme="dark"]{
  --bg:#061a18;--bg2:#041210;--bg3:#041210;
  --border:#0e2e2a;--border2:#1a4840;
  --text:#d0f0e8;--muted:#1a4840;
  --cyan:#00e09a;--cyan-dim:#0a3028;
  --green:#00e09a;--red:#e06060;
  --header-bg:#041210;--header-accent:#00e09a;
  --scanline:1;
}
[data-theme="light"]{
  --bg:#f0faf6;--bg2:#e8f6f0;--bg3:#ffffff;
  --border:#c8e8d8;--border2:#a0d0b8;
  --text:#041a10;--muted:#1a6040;
  --cyan:#008855;--cyan-dim:#c0e8d0;
  --green:#008855;--red:#cc3300;
  --header-bg:#063a28;--header-accent:#00c880;
  --scanline:0;
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:16px;
  min-height:100dvh;display:flex;flex-direction:column;
  overflow-x:hidden;transition:background .2s,color .2s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  opacity:var(--scanline);transition:opacity .2s;
}
a{color:inherit;text-decoration:none;}
button{font-family:'Noto Sans JP',sans-serif;}

/* ─── HEADER ─── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;height:52px;
  border-bottom:2px solid var(--header-accent);background:var(--header-bg);
  flex-shrink:0;gap:8px;min-width:0;
}
.logo{font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--header-accent);white-space:nowrap;}
.logo span{color:var(--muted);font-size:11px;font-weight:400;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
#clock{font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;letter-spacing:.03em;}
.theme-switcher{display:flex;gap:3px;}
.theme-btn{
  padding:5px 8px;border-radius:4px;border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;line-height:1;
}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
.theme-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,201,201,.1);}

/* ─── SESSION BAR ─── */
#session-bar{
  display:flex;gap:6px;padding:8px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.session-pill{
  font-size:12px;font-weight:500;padding:4px 10px;border-radius:3px;
  border:1.5px solid var(--border2);color:var(--muted);letter-spacing:.04em;
  transition:all .3s;white-space:nowrap;
}
.session-pill.active{color:var(--green);border-color:var(--green);background:rgba(46,204,113,.08);box-shadow:0 0 8px rgba(46,204,113,.2);}
.session-pill .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:5px;vertical-align:middle;}
.session-pill.active .dot{animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── PAGE CONTENT ─── */
.page-content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 12px 48px;display:flex;flex-direction:column;gap:14px;
}

/* ─── SECTION HEADING ─── */
.sec-heading{
  font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);
  text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);
}

/* ─── MAIN CHARTS (Hybrid Card) ─── */
.tv-main-grid{display:flex;flex-direction:column;gap:8px;}
.tv-widget-card{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  overflow:hidden;width:100%;display:flex;flex-direction:column;
}
.widget-header{padding:12px 16px 8px;display:flex;flex-direction:column;gap:4px;}
.widget-title-row{display:flex;align-items:center;gap:8px;}
.widget-icon{width:24px;height:24px;border-radius:50%;}
.widget-symbol-name{font-size:15px;font-weight:700;color:var(--text);}
.widget-price-row{display:flex;align-items:baseline;gap:8px;margin-top:2px;}
.widget-price-main{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.widget-price-currency{font-size:11px;color:var(--muted);font-weight:500;}
.widget-price-source{font-size:10px;color:var(--muted);font-weight:400;align-self:flex-end;margin-bottom:3px;letter-spacing:.03em;}
.tv-chart-container{height:160px;width:100%;}

/* ─── CHART GRID ─── */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chart-slot{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:12px;min-height:80px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;text-align:center;user-select:none;
}
.chart-slot.empty{border-style:dashed;}
.chart-slot.empty:active,.chart-slot.filled:active{opacity:.7;}
.slot-symbol{font-size:13px;font-weight:700;color:var(--text);}
.slot-name{font-size:10px;color:var(--muted);margin-top:2px;}
.slot-price{font-size:13px;font-weight:700;color:var(--cyan);margin-top:6px;}
.slot-price.stale{color:var(--muted);}
.closed-tag{font-size:10px;font-weight:400;color:var(--muted);}
.slot-add-icon{font-size:22px;color:var(--muted);}
.slot-add-label{font-size:10px;color:#8a8aaa;font-weight:700;margin-top:4px;}

/* ─── LAUNCH GRID ─── */
.launch-grid{display:flex;flex-direction:column;gap:8px;}
.launch-tv{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:15px;font-weight:700;color:var(--text);
  transition:border-color .15s,opacity .15s;
}
.launch-tv:active{opacity:.7;}
.tv-icon{font-size:20px;}
.launch-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.launch-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 8px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:14px;font-weight:700;color:var(--text);
  text-align:center;transition:border-color .15s,opacity .15s;
}
.launch-btn:active{opacity:.7;}
.launch-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:3px;}

/* ─── FEAR & GREED ─── */
.fng-wrap{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;
  padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;
}
.fng-value{font-size:40px;font-weight:700;line-height:1;min-width:56px;text-align:center;}
.fng-info{display:flex;flex-direction:column;gap:2px;}
.fng-label{font-size:15px;font-weight:700;}
.fng-updated{font-size:11px;color:var(--muted);margin-top:4px;}
.fng-meter{
  flex:1;height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin-top:6px;
}
.fng-meter-bar{height:100%;border-radius:4px;transition:width .5s;}

/* ─── NEWS ─── */
.news-list{display:flex;flex-direction:column;gap:6px;}
.news-item{
  padding:10px 12px;background:var(--bg3);
  border:1.5px solid var(--border2);border-radius:6px;
}
.news-meta{font-size:11px;color:var(--muted);margin-bottom:4px;}
.news-title a{
  font-size:13px;color:var(--text);line-height:1.5;
  text-decoration:none;display:block;
}
.news-title a:hover{color:var(--cyan);}
.news-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── MODAL OVERLAY ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:flex-end;
}
.modal-overlay.hidden{display:none;}

/* ─── MODAL SHEET ─── */
.modal-sheet{
  width:100%;max-height:85vh;background:var(--bg2);
  border-radius:12px 12px 0 0;border-top:1.5px solid var(--border2);
  padding:16px 14px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;}
.modal-close:hover{color:var(--text);}

.modal-search-wrap{margin-bottom:12px;}
.modal-search-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;padding:10px 12px;color:var(--text);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.modal-search-input:focus{border-color:var(--cyan);}
.modal-search-input::placeholder{color:var(--muted);}
.modal-search-input::-webkit-search-cancel-button{display:none;}

.result-item{
  padding:10px 12px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:6px;margin-bottom:4px;cursor:pointer;
  display:flex;gap:10px;align-items:center;transition:border-color .15s;
}
.result-item:hover{border-color:var(--cyan-dim);}
.result-item:active{opacity:.7;}
.result-symbol{font-size:13px;font-weight:700;color:var(--text);min-width:52px;}
.result-name{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-badge{
  font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;
  flex-shrink:0;letter-spacing:.04em;
}
.result-badge-xyz{background:rgba(56,201,201,.15);color:var(--cyan);border:1px solid rgba(56,201,201,.3);}
.result-badge-pyth{background:rgba(130,80,255,.15);color:#a080ff;border:1px solid rgba(130,80,255,.3);}
.results-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px;}

/* ─── LONGPRESS MENU ─── */
#overlay-lp .modal-sheet{padding:16px 14px 32px;}
.longpress-menu{display:flex;flex-direction:column;gap:8px;}
.longpress-menu button{
  padding:14px;border-radius:8px;border:1.5px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.longpress-menu button:active{opacity:.7;}
#lp-delete{color:var(--red);border-color:var(--red);}
#lp-cancel{color:var(--muted);}

/* ─── RESPONSIVE ─── */
@media(max-width:375px){
  #clock{font-size:11px;}
  .slot-price{font-size:12px;}
  .slot-symbol{font-size:12px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">FX COCKPIT FX <span>by azteca</span></div>
  <div class="header-right">

      <button class="theme-btn" data-theme="dark">D</button>

<div id="session-bar">

<div class="page-content">

<!-- モーダル・メニュー類は以前のものを維持 -->

<script>
// ─── TV SYMBOL MAP ───
const TV_SYMBOL_MAP = new Map([
  ['EURUSD','OANDA:EURUSD'],['USDJPY','OANDA:USDJPY'],['GBPUSD','OANDA:GBPUSD'],
  ['AUDUSD','OANDA:AUDUSD'],['USDCAD','OANDA:USDCAD'],['USDCHF','OANDA:USDCHF'],
  ['NZDUSD','OANDA:NZDUSD'],['EURJPY','OANDA:EURJPY'],['GBPJPY','OANDA:GBPJPY'],
  ['AUDJPY','OANDA:AUDJPY'],['EURGBP','OANDA:EURGBP'],['EURAUD','OANDA:EURAUD'],
  ['EURCAD','OANDA:EURCAD'],['EURCHF','OANDA:EURCHF'],['EURNZD','OANDA:EURNZD'],
  ['EURNOK','OANDA:EURNOK'],['EURSEK','OANDA:EURSEK'],['GBPAUD','OANDA:GBPAUD'],
  ['GBPCAD','OANDA:GBPCAD'],['GBPCHF','OANDA:GBPCHF'],['GBPNZD','OANDA:GBPNZD'],
  ['AUDCAD','OANDA:AUDCAD'],['AUDCHF','OANDA:AUDCHF'],['AUDNZD','OANDA:AUDNZD'],
  ['CADJPY','OANDA:CADJPY'],['CHFJPY','OANDA:CHFJPY'],['NZDJPY','OANDA:NZDJPY'],
  ['NZDCAD','OANDA:NZDCAD'],
  ['EUR','OANDA:EURUSD'],['JPY','OANDA:USDJPY'],['GBP','OANDA:GBPUSD'],
  ['AUD','OANDA:AUDUSD'],
  ['GOLD','OANDA:XAUUSD'],['SILVER','OANDA:XAGUSD'],
  ['CL','TVC:USOIL'],['BRENTOIL','TVC:UKOIL'],
  ['JP225','OANDA:JP225USD'],['SP500','OANDA:SPX500USD'],
  ['USDXY','TVC:DXY'],['DXY','TVC:DXY'],
]);

// ─── CONSTANTS ───
const STORAGE_KEY        = 'fxc-fx-data-v4';
const UNIVERSE_CACHE_KEY = 'pyth_xyz_universe_cache';
const UNIVERSE_CACHE_TTL = 24 * 60 * 60 * 1000;
const MAX_CHARTS         = 8;
const PRICE_INTERVAL     = 5000;
const MARKET_STALE_MS    = 6 * 60 * 60 * 1000;

const DEFAULT_CHARTS = [
  {id:'710afe0041a07156bfd71971160c78a326bf8121403e0d4e140d06bea0353b7f', symbol:'USDXY', name:'US Dollar Index', source:'pyth'},
  {id:'xyz:CL',    symbol:'CL',    name:'WTI Oil',     source:'xyz'},
  {id:'xyz:EUR',   symbol:'EUR',   name:'EUR/USD',     source:'xyz'},
  {id:'xyz:JP225', symbol:'JP225', name:'Nikkei 225',  source:'xyz'},
  null, null, null, null,
];

let _data             = { charts: DEFAULT_CHARTS.map(c => c ? {...c} : null) };
let _universe         = [];
let _prices           = {};
let _pythPrices       = {};
let _pythPublishTimes = {};
let _pendingSlot      = null;
let _searchTimer      = null;

// ─── STORAGE ───
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const p = JSON.parse(s);
      if (Array.isArray(p.charts)) {
        _data.charts = p.charts;
        while (_data.charts.length < MAX_CHARTS) _data.charts.push(null);
        _data.charts = _data.charts.slice(0, MAX_CHARTS);
      }
    } else { saveData(); }
  } catch(e) { saveData(); }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(_data)); }

// ─── UNIVERSE ───
async function loadUniverse() {
  try {
    const cached = localStorage.getItem(UNIVERSE_CACHE_KEY);
    if (cached) {
      const cache = JSON.parse(cached);
      if (Date.now() - cache.timestamp < UNIVERSE_CACHE_TTL) { _universe = cache.feeds; return; }
    }
    const [xyzRes, pythRes] = await Promise.allSettled([
      fetch('https://api.hyperliquid.xyz/info', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'metaAndAssetCtxs', dex:'xyz'})}).then(r => r.json()),
      fetch('https://hermes.pyth.network/v2/price_feeds').then(r => r.json())
    ]);
    const xyz  = xyzRes.status  === 'fulfilled' ? xyzRes.value[0].universe.map(u => ({id:'xyz:'+u.name, symbol:u.name, name:u.name, source:'xyz'})) : [];
    const pyth = pythRes.status === 'fulfilled' ? pythRes.value.map(f => ({id:f.id, symbol:(f.attributes.generic_symbol||f.attributes.symbol), name:f.attributes.description, source:'pyth'})).filter(f=>f.symbol) : [];
    const xyzSyms = new Set(xyz.map(f => f.symbol.toUpperCase()));
    _universe = [...xyz, ...pyth.filter(f => !xyzSyms.has(f.symbol.toUpperCase()))];
    localStorage.setItem(UNIVERSE_CACHE_KEY, JSON.stringify({timestamp:Date.now(), feeds:_universe}));
  } catch(e) { console.warn('Universe failed', e); }
}

// ─── FORMAT ───
function fmtPrice(v) {
  if (v == null) return '--';
  const n = parseFloat(v);
  if (isNaN(n)) return '--';
  if (n >= 10000) return n.toLocaleString('en-US', {maximumFractionDigits:2});
  if (n >= 100)   return n.toLocaleString('en-US', {maximumFractionDigits:3});
  return n.toFixed(4);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function coinSource(coin) {
  if (coin.source) return coin.source;
  return coin.id.startsWith('xyz:') ? 'xyz' : 'pyth';
}
function getPriceText(coin) {
  if (!coin) return '--';
  if (coinSource(coin) === 'xyz') return fmtPrice(_prices[coin.id]);
  return fmtPrice(_pythPrices[coin.id]);
}

// ─── RENDER SLOTS ───
function renderChartSlots() {
  const grid = document.getElementById('chart-grid');
  grid.innerHTML = '';
  _data.charts.forEach((coin, i) => {
    const el = document.createElement('div');
    if (coin) {
      el.className = 'chart-slot filled';
      el.innerHTML = `<div class="slot-symbol">${escHtml(coin.symbol)}</div><div class="slot-name">${escHtml(coin.name)}</div><div class="slot-price">${getPriceText(coin)}</div>`;
      el.dataset.coinId = coin.id;
    } else {
      el.className = 'chart-slot empty';
      el.innerHTML = '<div class="slot-add-icon">＋</div><div class="slot-add-label">銘柄を追加</div>';
    }
    attachSlotHandlers(el, i);
    grid.appendChild(el);
  });
}

function refreshPriceDisplay() {
  document.querySelectorAll('.chart-slot.filled').forEach(el => {
    const coin = _data.charts.find(c => c && c.id === el.dataset.coinId);
    if (!coin) return;
    const priceEl = el.querySelector('.slot-price');
    if (priceEl) priceEl.textContent = getPriceText(coin);
  });
}

// ─── SLOT HANDLERS ───
function attachSlotHandlers(el, index) {
  let lpTimer = null, lpFired = false, startX = 0, startY = 0;
  el.addEventListener('touchstart', e => {
    lpFired = false;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    lpTimer = setTimeout(() => { lpFired = true; showLpMenu(index); }, 400);
  }, {passive:true});
  el.addEventListener('touchmove', e => {
    if (!lpTimer) return;
    if (Math.abs(e.touches[0].clientX-startX)>10 || Math.abs(e.touches[0].clientY-startY)>10) { clearTimeout(lpTimer); lpTimer=null; }
  }, {passive:true});
  el.addEventListener('touchend',    () => { clearTimeout(lpTimer); lpTimer=null; }, {passive:true});
  el.addEventListener('touchcancel', () => { clearTimeout(lpTimer); lpTimer=null; }, {passive:true});
  el.addEventListener('contextmenu', e => e.preventDefault());
  el.addEventListener('click', () => {
    if (lpFired) { lpFired=false; return; }
    const coin = _data.charts[index];
    if (coin) {
      const sym = coin.symbol.replace('xyz:','').toUpperCase();
      const tvSym = TV_SYMBOL_MAP.get(sym);
      if (tvSym) {
        window.open('https://www.tradingview.com/chart/?symbol='+encodeURIComponent(tvSym), '_blank', 'noopener');
      } else {
        window.open('https://jp.tradingview.com', '_blank', 'noopener');
      }
    } else {
      openChartModal(index);
    }
  });
}

// ─── LONGPRESS MENU ───
function showLpMenu(index) { _pendingSlot=index; document.getElementById('overlay-lp').classList.remove('hidden'); }
function hideLpMenu()       { document.getElementById('overlay-lp').classList.add('hidden'); }
document.getElementById('lp-change').addEventListener('click', () => { hideLpMenu(); if(_pendingSlot==null) return; openChartModal(_pendingSlot); });
document.getElementById('lp-delete').addEventListener('click', () => { if(_pendingSlot==null) return; _data.charts[_pendingSlot]=null; saveData(); renderChartSlots(); hideLpMenu(); });
document.getElementById('lp-cancel').addEventListener('click', hideLpMenu);
document.getElementById('overlay-lp').addEventListener('click', e => { if(e.target===document.getElementById('overlay-lp')) hideLpMenu(); });

// ─── CHART MODAL ───
function openChartModal(index) {
  _pendingSlot = index;
  document.getElementById('chart-search').value = '';
  document.getElementById('chart-results').innerHTML = '';
  document.getElementById('overlay-chart').classList.remove('hidden');
  setTimeout(() => document.getElementById('chart-search').focus(), 280);
}
function closeChartModal() { document.getElementById('overlay-chart').classList.add('hidden'); }
document.getElementById('close-chart').addEventListener('click', closeChartModal);
document.getElementById('overlay-chart').addEventListener('click', e => { if(e.target===document.getElementById('overlay-chart')) closeChartModal(); });

document.getElementById('chart-search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  const q = e.target.value;
  _searchTimer = setTimeout(() => {
    const container = document.getElementById('chart-results');
    if (!q.trim()) { container.innerHTML=''; return; }
    const query = q.trim().toLowerCase();
    const results = _universe.filter(s => {
      const sym  = s.symbol.toLowerCase();
      const name = s.name.toLowerCase();
      return sym.includes(query) || name.includes(query);
    }).slice(0, 30);
    if (!results.length) { container.innerHTML='<div class="results-empty">該当銘柄なし</div>'; return; }
    container.innerHTML = results.map(s => {
      const bc = s.source==='xyz' ? 'result-badge-xyz' : 'result-badge-pyth';
      const bl = s.source==='xyz' ? 'HYP' : 'PYTH';
      return `<div class="result-item" data-id="${escHtml(s.id)}" data-symbol="${escHtml(s.symbol)}" data-name="${escHtml(s.name)}" data-source="${escHtml(s.source)}">
        <span class="result-symbol">${escHtml(s.symbol)}</span>
        <span class="result-name">${escHtml(s.name)}</span>
        <span class="result-badge ${bc}">${bl}</span>
      </div>`;
    }).join('');
  }, 200);
});

document.getElementById('chart-results').addEventListener('click', e => {
  const item = e.target.closest('.result-item');
  if (!item || _pendingSlot==null) return;
  _data.charts[_pendingSlot] = {id:item.dataset.id, symbol:item.dataset.symbol, name:item.dataset.name, source:item.dataset.source};
  saveData();
  closeChartModal();
  renderChartSlots();
  updatePrices();
});

// ─── PRICE FETCH ───
async function updatePrices() {
  const activeCharts = _data.charts.filter(Boolean);
  const pythCharts   = activeCharts.filter(c => coinSource(c) === 'pyth');

  const [xyzRes] = await Promise.allSettled([
    fetch('https://api.hyperliquid.xyz/info', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'allMids', dex:'xyz'})}).then(r => r.json())
  ]);
  if (xyzRes.status === 'fulfilled') {
    const mids = xyzRes.value.mids || xyzRes.value;
    for (const [k, v] of Object.entries(mids)) {
      _prices[k] = v;
      _prices[k.replace('xyz:', '')] = v;
    }
  }

  if (pythCharts.length > 0) {
    try {
      const params = pythCharts.map(c => 'ids[]='+encodeURIComponent(c.id)).join('&');
      const pythRes = await fetch('https://hermes.pyth.network/v2/updates/price/latest?'+params).then(r => r.json());
      (pythRes.parsed || []).forEach(p => {
        _pythPrices[p.id]       = p.price.price * Math.pow(10, p.price.expo);
        _pythPublishTimes[p.id] = p.price.publish_time;
      });
    } catch(e) { console.warn('Pyth fetch failed:', e); }
  }

  const usdjpy = _prices['JPY'] || _prices['USDJPY'];
  const gold   = _prices['GOLD'];
  const uEl = document.getElementById('main-price-usdjpy');
  const gEl = document.getElementById('main-price-gold');
  if (uEl) uEl.textContent = fmtPrice(usdjpy);
  if (gEl) gEl.textContent = fmtPrice(gold);

  refreshPriceDisplay();
}

// ─── TRADINGVIEW WIDGETS ───
function initTVWidgets() {
  const theme = document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
  ['tv-usdjpy-wrap','tv-dxy-wrap'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
  function create(id, symbol) {
    if (typeof TradingView !== 'undefined') {
      new TradingView.widget({
        autosize:true, symbol:symbol, interval:'60', theme:theme, style:'1', locale:'ja',
        hide_top_toolbar:true, hide_legend:true, save_image:false, container_id:id, range:'5D'
      });
    }
  }
  create('tv-usdjpy-wrap', 'OANDA:USDJPY');
  create('tv-dxy-wrap',    'OANDA:XAUUSD');
}

(function(){

// ─── CLOCK ───
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0')+' JST';
}
setInterval(updateClock, 1000);
updateClock();

// ─── SESSIONS ───
function updateSessions() {
  const now = new Date();
  const h = now.getHours() + now.getMinutes()/60;
  function active(s,e) { return e<=24 ? h>=s&&h<e : h>=s||h<(e-24); }
  document.getElementById('sess-tokyo').classList.toggle('active',  active(8,15));
  document.getElementById('sess-london').classList.toggle('active', active(16,25));
  document.getElementById('sess-ny').classList.toggle('active',     active(21,30));
}
setInterval(updateSessions, 10000);
updateSessions();

// ─── TRADINGVIEW APP LAUNCH ───
document.getElementById('btn-tradingview').addEventListener('click', function() {
  const webUrl = 'https://jp.tradingview.com';
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  const timer = setTimeout(() => { document.removeEventListener('visibilitychange',onHide); if(!appOpened) window.open(webUrl,'_blank','noopener,noreferrer'); }, 1500);
  window.location.href = 'tradingview://';
});

document.querySelectorAll('.launch-btn').forEach(btn => {

// ─── FEAR & GREED ───
async function loadFng() {
  try {
    const r = await fetch('https://api.alternative.me/fng/').then(r => r.json());
    const item = r.data && r.data[0];
    if (!item) return;
    const val = parseInt(item.value, 10);
    const label = item.value_classification || '';
    const ts = new Date(parseInt(item.timestamp,10)*1000);
    const color = val<=25?'var(--red)':val<=46?'#e67e22':val<=54?'var(--muted)':val<=75?'var(--green)':'#27ae60';
    const vEl=document.getElementById('fng-value'), lEl=document.getElementById('fng-label');
    const uEl=document.getElementById('fng-updated'), bEl=document.getElementById('fng-bar');
    if(vEl){vEl.textContent=val;vEl.style.color=color;}
    if(lEl){lEl.textContent=label;lEl.style.color=color;}
    if(uEl) uEl.textContent='更新: '+(ts.getMonth()+1)+'/'+(ts.getDate());
    if(bEl){bEl.style.width=val+'%';bEl.style.background=color;}
    document.querySelector('.fng-wrap').addEventListener('click',()=>window.open('https://edition.cnn.com/markets/fear-and-greed','_blank','noopener'));
  } catch(e) { console.warn('FnG failed:', e); }
}

// ─── NEWS ───
async function loadNews() {
  const container = document.getElementById('news-list');
  try {
    const d = await fetch('public/data/news.json?t='+Date.now()).then(r => r.json());
    function toJST(iso) {
      if (!iso) return '';
      const jst = new Date(new Date(iso).getTime()+9*3600000);
      return (jst.getUTCMonth()+1)+'/'+(String(jst.getUTCDate()).padStart(2,'0'))+' '+(String(jst.getUTCHours()).padStart(2,'0'))+':'+(String(jst.getUTCMinutes()).padStart(2,'0'));
    }
    const items = [...(d.gold_items||[]),...(d.usdjpy_items||[])].sort((a,b)=>(b.isoDate||'').localeCompare(a.isoDate||'')).slice(0,15);
    if (!items.length) { container.innerHTML='<div class="news-empty">ニュースなし</div>'; return; }
    container.innerHTML = items.map(i =>
      `<div class="news-item"><div class="news-meta">${escHtml(i.source||'')} · ${escHtml(toJST(i.isoDate))} JST</div><div class="news-title"><a href="${escHtml(i.link||'#')}" target="_blank" rel="noopener">${escHtml(i.title||'')}</a></div></div>`
    ).join('');
  } catch(e) { container.innerHTML='<div class="news-empty">ニュース取得エラー</div>'; }
}

// ─── PULL TO REFRESH ───
(function(){
  const content   = document.querySelector('.page-content');
  const indicator = document.getElementById('ptr-indicator');
  let startY=0, pulling=false;
  const THRESHOLD=80;
  content.addEventListener('touchstart', e => { if(content.scrollTop===0){startY=e.touches[0].clientY;pulling=true;} }, {passive:true});
  content.addEventListener('touchmove',  e => {
    if(!pulling) return;
    const dy = e.touches[0].clientY-startY;
    if(dy>0&&content.scrollTop===0){
      indicator.style.height = Math.min(dy*0.5,44)+'px';
      indicator.textContent  = dy>=THRESHOLD?'離して更新':'↓ 引っ張って更新';
    }
  }, {passive:true});
  content.addEventListener('touchend', e => {
    if(!pulling) return;
    pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    indicator.style.height='0';
    indicator.textContent='↓ 引っ張って更新';
    if(dy>=THRESHOLD&&content.scrollTop===0){ updatePrices(); loadFng(); }
  }, {passive:true});
})();

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(!refreshing){refreshing=true;window.location.reload();} });
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e)); });
}
window.addEventListener('pageshow', e => { if(e.persisted) initTVWidgets(); });

// ─── INIT ───
async function init() {
  loadData();
  renderChartSlots();
  initTVWidgets();
  await loadUniverse();
  updatePrices();
  setInterval(updatePrices, PRICE_INTERVAL);
  loadFng();
  loadNews();
}
init();
